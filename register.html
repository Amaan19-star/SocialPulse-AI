<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Register Page</h1>

    <form method="POST">
        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <br><br>

        <button type="submit">Register</button>
    </form>

    <br>

    <a href="{{ url_for('login') }}">
        Back to Login
    </a>

</body>
</html>
